; =============================================================================
; PyPilot Wireless Serial Bridge — ESP32-C3 HW466AB
; =============================================================================
; Transparent WiFi TCP / BLE serial bridge between a PyPilot host and a
; motor-driver connected via hardware UART1.
;
; Board  : ESP32-C3 (QFN32, 4MB embedded flash) — "HW466AB"
; UART TX: GPIO 4    UART RX: GPIO 5    Baud: 38400
; LED    : WS2812 on GPIO 8
; =============================================================================

[env:esp32c3]
platform  = espressif32
board     = esp32-c3-devkitc-02
framework = arduino

; --- Flash -------------------------------------------------------------------
board_build.flash_size      = 4MB
board_build.flash_mode      = dio
board_build.partitions      = default.csv

; --- USB-CDC (Serial via built-in USB JTAG/serial) ---------------------------
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_NIMBLE_CPP_ATT_MTU=247

; --- Monitor ------------------------------------------------------------------
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; --- Libraries ----------------------------------------------------------------
lib_deps =
    mathieucarbou/ESP Async WebServer@^3.0.6
    h2zero/NimBLE-Arduino@^2.1.1
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit NeoPixel@^1.12.0

lib_ignore =
    AsyncTCP_RP2040W
    ESPAsyncTCP-esphome
